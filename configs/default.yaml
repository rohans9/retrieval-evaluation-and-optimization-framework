device: auto
logging:
  level: INFO
ingestion:
  input_directory: data/raw
  recursive: true
  supported_extensions:
    - .pdf
    - .docx
    - .txt
    - .md
preprocessing:
  normalize_unicode: true
  cleanup_whitespace: true
  remove_headers: true
  remove_footers: true
  remove_page_numbers: true
  remove_empty_lines: true
chunking:
  strategy: recursive
  chunk_size: 120
  overlap: 20
  semantic_similarity_threshold: 0.58
  semantic_min_sentences: 2
  semantic_encoder_model:
output:
  output_directory: data/processed
  processed_corpus_filename: processed_corpus.json
embedding:
  model_name: sentence-transformers/all-MiniLM-L6-v2
  backend: auto
  device: auto
  batch_size: 32
  normalize_embeddings: true
  fallback_dimension: 384
  cache_directory: data/cache/embeddings
  show_progress: true
index:
  index_directory: data/index
  bm25:
    k1: 1.5
    b: 0.75
  dense:
    metric: cosine
retrieval:
  retriever: hybrid
  top_k: 10
  fusion:
    strategy: reciprocal_rank_fusion
    rrf_k: 60
query_enhancement:
  enabled: false
  method: none
  expansion:
    max_expansion_terms: 3
    similarity_threshold: 0.35
    vocabulary_size: 512
  hyde:
    backend: auto
    generator_model: gpt2
    max_new_tokens: 48
reranking:
  enabled: true
  backend: auto
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_n: 5
benchmark:
  dataset_path: data/evaluation/policy_eval_dataset.json
  experiment_directory: reports/experiments
  results_directory: reports/benchmarks
  test_split_ratio: 0.2
  notes:
reporting:
  reports_directory: reports/generated
  include_csv: true
  include_json: true
  include_markdown: true
visualization:
  output_directory: reports/visualizations
  export_html: true
  export_png: true
recommendation:
  quality_weight: 0.65
  latency_weight: 0.2
  embedding_cost_weight: 0.075
  index_build_weight: 0.075